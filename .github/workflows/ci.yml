name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Install Vale
        run: |
          curl -sfL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vale
        env:
          VALE_VERSION: 3.14.1

      # Errors only. Suggestions and warnings are advisory and do not gate.
      - name: Check prose
        run: pnpm run check:prose:errors

      # Informational: en to zh drift is tracked, not yet gated.
      - name: Report locale drift
        run: pnpm run check:locales
        continue-on-error: true

      - name: Validate Mintlify build
        run: npx -y mint@latest validate

      - name: Check for broken links
        run: npx -y mint@latest broken-links
