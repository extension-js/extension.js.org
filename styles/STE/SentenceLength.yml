# Derived from ASD-STE100 writing rules 3.1 / 3.2 (sentence length).
# Descriptive prose is capped at 25 words. Procedural steps use STE.StepLength.
extends: occurrence
message: "Long sentence. Keep descriptive sentences under 25 words so they survive translation."
level: suggestion
scope: sentence
max: 25
token: '\b\w+\b'
