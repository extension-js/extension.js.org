# Derived from ASD-STE100 writing rule 2.1: one instruction per sentence.
# Chained steps hide the second action from a reader who is scanning.
extends: existence
message: "One instruction per step. Split this into two steps."
level: suggestion
ignorecase: true
scope: list
tokens:
  - '\band then\b'
  - ',\s+then\s+(?:run|open|click|choose|add|edit|set|load|reload|build|install|pass|check)\b'
