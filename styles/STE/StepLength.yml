# Derived from ASD-STE100 writing rule 3.1 (procedural sentences: 20 words max).
# Scoped to list items, which is where this site keeps its instructions.
extends: occurrence
message: "Long procedural step. Keep instructions under 20 words, or split them into two steps."
level: suggestion
scope: list
max: 20
token: '\b\w+\b'
