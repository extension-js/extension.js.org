# Derived from ASD-STE100 writing rule 5.3: do not omit the relative pronoun.
# "the file that you created", not "the file you created".
# Highest-value rule for machine translation and for the zh-Hans/zh-Hant mirrors,
# where a dropped pronoun forces the translator to guess the clause boundary.
# The verb list is closed on purpose to keep false positives near zero.
extends: existence
message: "Keep the relative pronoun: 'the file that you created', not 'the file you created'."
level: suggestion
ignorecase: true
tokens:
  - '\b(?:the|a|an|any|each|every|this|these|those)\s+(?!time|when|while|moment|point)[a-z]+\s+(?:you|we|it|they)\s+(?:created?|ran|runs?|built?|builds?|added?|installed?|install|wrote|writes?|chose|choose|passed?|sets?|defined?|define|configured?|configure|specified|specify|loaded?|load|used?|use|wants?|needs?|edited?|edit|modified|modify|selected?|select|saw|sees?|expects?|declared?|declare|returned?|returns?)\b'
