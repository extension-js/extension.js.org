# AGENTS.md, Conventions > Verbs: prefer "choose" for selection language.
# Suggestion level: "select" is legitimate when naming a <select> element,
# a CSS selector, or selected text, and Vale cannot tell those apart.
extends: substitution
message: "Use '%s' instead of '%s' for selection language."
level: suggestion
ignorecase: true
swap:
  pick: choose
  picks: chooses
  picking: choosing
  select: choose
  selects: chooses
