# AGENTS.md, Conventions > Voice: no marketing language.
extends: existence
message: "'%s' is marketing language. Say what it does instead."
level: warning
ignorecase: true
tokens:
  - powerful
  - seamless(ly)?
  - effortless(ly)?
  - cutting.edge
  - blazing(ly)?
  - game.chang(er|ing)
  - revolutionary
  - simply
  - just works
  - unlock the power
  - best.in.class
  - world.class
