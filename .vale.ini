StylesPath = styles
MinAlertLevel = suggestion
Vocab = Mintlify

# ExtensionJS = house rules from AGENTS.md.
# STE          = subset of ASD-STE100 chosen for translation safety.
[*.mdx]
BasedOnStyles = ExtensionJS, STE

# The landing page is JSX-heavy and deliberately writes in a different register.
# House voice still applies; the STE sentence caps do not.
[index.mdx]
BasedOnStyles = ExtensionJS

# Blog posts are announcements, not procedures.
[blog/*.mdx]
BasedOnStyles = ExtensionJS

# The zh-Hans and zh-Hant mirrors are excluded at the command level
# (see the check:prose script) because these rules are English-only.
